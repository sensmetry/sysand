# This file was initially autogenerated by maturin with the command below, but
# have since been heavily modified.
#
#    maturin generate-ci github --pytest --manifest-path bindings/py/Cargo.toml
#
name: Python

on:
  push:
    branches: ["main"]
    tags: ["*"]
    paths:
      - "bindings/py/**"
      - "core/**"
      - "sysand/**"
      - "Cargo.*"
      - ".github/workflows/python.yml"
      - ".github/scripts/*"
  pull_request:
    branches: ["main"]
    paths:
      - "bindings/py/**"
      - "core/**"
      - "sysand/**"
      - "Cargo.*"
      - ".github/workflows/python.yml"
      - ".github/scripts/*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  UV_HTTP_RETRIES: 5
  UV_HTTP_TIMEOUT: 60

jobs:
  lint:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: bindings/py

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7

      - name: Setup environment
        run: |
          uv sync --group linters --active --no-install-project --locked
          echo "$(pwd)/.venv/bin" >> "$GITHUB_PATH"

      - name: ruff format ...
        run: ruff format --check python tests

      - name: ruff check ...
        run: ruff check python

      - name: mypy ...
        run: mypy --strict python

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            rust_target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: arm64 # not aarch64 because expected by setup-python
            rust_target: aarch64-pc-windows-msvc
        # A single python version is used for each run, because some tools
        # don't know which version to use if multiple are present
        python:
          - version: "3.14t"
            label: 3.14-free-threaded
            args_suffix: --interpreter python3.14t
        exclude:
          # Free-threaded python does not work on windows arm currently
          # https://github.com/actions/setup-python/issues/1267
          - platform:
              runner: windows-11-arm
            python:
              version: "3.14t"
        include:
          # The lowest supported version on x86 is 3.10, and only python 3.11+
          # are available on the windows arm runners
          - platform:
              runner: windows-latest
              target: x64
              rust_target: x86_64-pc-windows-msvc
            python:
              version: "3.11"
              label: "3.11"
              args_suffix: ""
          - platform:
              runner: windows-11-arm
              target: arm64 # not aarch64 because expected by setup-python
              rust_target: aarch64-pc-windows-msvc
            python:
              version: "3.11"
              label: "3.11"
              args_suffix: ""

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python.version }}
          architecture: ${{ matrix.platform.target }}
      - uses: astral-sh/setup-uv@v7

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: cargo test ... (Python bindings)
        run: |
          cd bindings/py
          cargo test --locked --package sysand-py --verbose --no-default-features --target ${{ matrix.platform.rust_target }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.rust_target }}
          working-directory: bindings/py
          args: --release --out ../../dist --compatibility pypi ${{ matrix.python.args_suffix }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}-${{ matrix.python.label }}
          path: dist

      - name: pytest
        run: |
          export UV_PYTHON=${{ matrix.python.version }}
          export ACTIVATION_SCRIPT=.venv/Scripts/activate
          /bin/bash .github/scripts/run-pytest.sh ${{ matrix.python.version }}

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: x86_64
          - runner: ubuntu-24.04
            target: x86
          - runner: ubuntu-24.04-arm
            target: aarch64

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: cargo test ... (Python bindings)
        run: cargo test --locked --package sysand-py --verbose --no-default-features

      - name: Build wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          working-directory: bindings/py
          args: --release --out ../../dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: manylinux2014

      - name: Build free-threaded wheels (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          working-directory: bindings/py
          args: --release --out ../../dist --compatibility pypi --interpreter python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: manylinux2014 # TODO: don't use default cross-compile containers for aarch64

      - name: Build wheels (musllinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          working-directory: bindings/py
          args: --release --out ../../dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2

      - name: Build free-threaded wheels (musllinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          working-directory: bindings/py
          args: --release --out ../../dist --compatibility pypi --interpreter python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

      - name: pytest (manylinux)
        if: ${{ matrix.platform.target != 'x86' }}
        run: /bin/bash .github/scripts/run-pytest.sh

      - name: pytest (manylinux)
        if: ${{ matrix.platform.target == 'x86' }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/io -w /io \
            ${{ matrix.platform.target == 'x86' && 'i386/ubuntu:latest' }} \
            sh -c '
              apt-get update
              apt-get install -y curl bash python3
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH=$PATH:$HOME/.local/bin
              /bin/bash .github/scripts/run-pytest.sh
            '

      - name: pytest (musllinux)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/io -w /io \
            ${{ matrix.platform.target == 'x86' && 'i386/alpine:latest' || 'alpine:latest' }} \
            sh -c '
              apk add curl bash python3
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH=$PATH:$HOME/.local/bin
              /bin/bash .github/scripts/run-pytest.sh
            '

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: cargo test ... (Python bindings)
        run: cargo test --locked --package sysand-py --verbose --no-default-features

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          working-directory: bindings/py
          args: --release --out ../../dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          working-directory: bindings/py
          args: --release --out ../../dist --compatibility pypi --interpreter python3.14t
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

      - name: pytest
        run: |
          /bin/bash .github/scripts/run-pytest.sh

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Maturin workaround
        # Maturin-action blindly downloads the specified toolchain without
        # checking that it won't be needed at all for sdist
        # TODO: fix maturin so that this isn't needed
        run: rm rust-toolchain.toml

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: bindings/py
          args: --out ../../dist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release to PyPI
    environment: pypi-publish
    runs-on: ubuntu-slim
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [lint, linux, macos, windows, sdist]
    permissions:
      # Used to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v7

      - name: Generate artifact attestation
        id: attest
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "wheels-*/*"

      - name: Prepare attestations for uv
        run: |
          # The action creates one attestation bundle for all artifacts, but
          # uv expects a separate .publish.attestation file for each artifact
          for file in wheels-*/*; do
            cp "${{ steps.attest.outputs.bundle-path }}" "$file.publish.attestation"
          done

      - uses: astral-sh/setup-uv@v7
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}

      - name: Publish to PyPI
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: |
          uv publish -v --trusted-publishing always wheels-*/*
