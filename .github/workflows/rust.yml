name: Rust (Library & CLI)

on:
  push:
    branches: [main]
    tags: ["*"]
    paths:
      - "core/**"
      - "sysand/**"
      - "Cargo.*"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/**"
      - "sysand/**"
      - "Cargo.*"
      - ".github/workflows/rust.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  UV_HTTP_RETRIES: 5
  UV_HTTP_TIMEOUT: 60

jobs:
  lint-and-format:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - uses: taiki-e/install-action@cargo-hack

      - name: cargo hack clippy ...
        run: cargo hack clippy --each-feature --no-dev-deps --features std --ignore-unknown-features -- --deny warnings

      - name: cargo clippy ...
        run: cargo clippy --locked --all-targets --all-features -- --deny warnings

      - name: cargo fmt ...
        run: cargo fmt --check

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel # x86
          - macos-latest # arm64

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: cargo test ... (Rust library & CLI)
        run: >-
          cargo test --locked
          --package sysand-core
          --package sysand
          --features sysand-core/filesystem,sysand-core/networking,sysand-core/js,sysand-core/python,alltests,kpar-bzip2,kpar-zstd,kpar-xz,kpar-ppmd

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-15-intel # x86
          - macos-latest # arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: cargo build ...
        run: cargo build --locked --bin sysand --release

      - name: Relocate binaries
        run: |
          mkdir -p dist
          ext=${{ (matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm') && '.exe' || '' }}
          cp target/release/sysand${ext} dist/sysand-${{ matrix.os }}${ext}

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: sysand-cli-${{ matrix.os }}
          path: dist/*

  nightly-release:
    name: Nightly Release
    needs: [test, build]
    if: ${{ github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "artifacts/*"

      - name: Rename artifacts
        run: |
          mv artifacts/sysand-ubuntu-24.04 artifacts/sysand-linux-x86_64
          mv artifacts/sysand-ubuntu-24.04-arm artifacts/sysand-linux-arm64
          mv artifacts/sysand-windows-latest.exe artifacts/sysand-windows-x86_64.exe
          mv artifacts/sysand-windows-11-arm.exe artifacts/sysand-windows-arm64.exe
          mv artifacts/sysand-macos-15-intel artifacts/sysand-macos-x86_64
          mv artifacts/sysand-macos-latest artifacts/sysand-macos-arm64

      - name: Create release tag
        run: echo "TAG_NAME=$(date +v-%Y-%m-%d-%H%M)" >> $GITHUB_ENV

      - name: Create a nightly release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            artifacts/*
          overwrite_files: false
          tag_name: ${{ env.TAG_NAME }}
          name: Nightly Release ${{ env.TAG_NAME }}

  release:
    name: Release
    needs: [test, build]
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "artifacts/*"

      - name: Rename artifacts
        run: |
          mv artifacts/sysand-ubuntu-24.04 artifacts/sysand-linux-x86_64
          mv artifacts/sysand-ubuntu-24.04-arm artifacts/sysand-linux-arm64
          mv artifacts/sysand-windows-latest.exe artifacts/sysand-windows-x86_64.exe
          mv artifacts/sysand-windows-11-arm.exe artifacts/sysand-windows-arm64.exe
          mv artifacts/sysand-macos-15-intel artifacts/sysand-macos-x86_64
          mv artifacts/sysand-macos-latest artifacts/sysand-macos-arm64

      - name: Create a release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            artifacts/*
          overwrite_files: false
          name: Release ${{ github.event.inputs.tag_name }}
