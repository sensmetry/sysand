name: Rust (Library & CLI)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  UV_HTTP_RETRIES: 5
  UV_HTTP_TIMEOUT: 60

jobs:
  plan:
    runs-on: ubuntu-slim
    outputs:
      test: ${{ steps.decisions.outputs.test }}
      gate: ${{ steps.decisions.outputs.gate }}
      lint_and_format: ${{ steps.decisions.outputs.lint_and_format }}
    steps:
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        if: github.event_name == 'pull_request'
        id: filter
        with:
          filters: |
            src:
              - 'core/**'
              - 'macros/**'
              - 'sysand/**'
              - 'Cargo.*'
              - '.github/workflows/rust.yml'
            rs_src:
              - '**/Cargo.*'
              - '**/*.rs'
      - id: decisions
        run: |
          test=${{ steps.filter.outputs.src == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          gate=${{ github.event_name == 'pull_request' }}
          echo "test=$test" >> "$GITHUB_OUTPUT"
          echo "gate=$gate" >> "$GITHUB_OUTPUT"

          lint_and_format=${{ steps.filter.outputs.rs_src == 'true' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          echo "lint_and_format=$lint_and_format" >> "$GITHUB_OUTPUT"

  lint-and-format:
    needs: [plan]
    if: needs.plan.outputs.lint_and_format == 'true'
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-hack

      # cargo clippy is run with variants of features enabled, where
      # --all-features is done by prek so we don't do it here

      - name: cargo clippy ... (no features)
        run: cargo clippy --workspace --locked --all-targets -- --deny warnings

      - name: cargo clippy --features std,filesystem,alltests ...  (specific feature set 1)
        run: cargo clippy --workspace --locked --all-targets --no-default-features --features std,filesystem,alltests -- --deny warnings

      - name: cargo clippy --features std,networking,alltests ... (specific feature set 2)
        run: cargo clippy --workspace --locked --all-targets --no-default-features --features std,networking,alltests -- --deny warnings

      # since we use --no-dev-deps below (as recommended), we don't do
      # --all-targets to include tests with required development dependencies
      - name: cargo hack clippy --each-feature ... (individual features)
        run: cargo hack clippy --each-feature --no-dev-deps --features std --ignore-unknown-features -- --deny warnings

  test:
    needs: [plan]
    if: needs.plan.outputs.test == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # About Linux GNU vs MUSL builds:
          #
          # GNU:  debian, ubuntu, rhel, fedora, arch, ...
          # MUSL: scratch, alpine, gentoo, ...
          #
          # ubuntu-22.04 is used intentionally instead of ubuntu-24.04 for the
          # libc=gnu builds. With ubuntu 22.04 instead of 24.04, we build a
          # binary dynamically linking against glibc 2.35+ instead of 2.39+.
          # That makes the build compatible with more versions of various glibc
          # based distributions, like ubuntu 22.04+, debian 12+, and rhel 10+.
          #
          # The MUSL builds are static, with no dynamically linked dependencies,
          # and can work on GNU / glibc based distributions, but not the other
          # way around. GNU / MUSL may have differences such as DNS resolution
          # behavior in complicated cases, but is mostly expected to work the
          # same way.
          #
          - os: ubuntu-22.04
            libc: gnu
          - os: ubuntu-22.04-arm
            libc: gnu
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            libc: musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            libc: musl
          - os: windows-latest
            target: ""
          - os: windows-11-arm
            target: ""
          - os: macos-15-intel # x86
            target: ""
          - os: macos-latest # arm64
            target: ""

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: (linux musl) Install musl tools
        if: matrix.libc == 'musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.target }}"

          target="${{ matrix.target }}"
          echo "CC_${target//-/_}=musl-gcc" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_TARGET=$target" >> "$GITHUB_ENV"

      - name: cargo test ... (Rust library & CLI)
        run: >-
          cargo test --locked
          --package sysand-core
          --package sysand
          --features sysand-core/filesystem,sysand-core/networking,alltests,kpar-bzip2,kpar-zstd,kpar-xz,kpar-ppmd

  build:
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # See comment above regarding Linux GNU vs MUSL builds, and don't
          # upgrade from ubuntu 22.04 without considering it.
          - os: ubuntu-22.04
            asset: sysand-linux-x86_64-gnu
            binary: target/release/sysand
            libc: gnu
          - os: ubuntu-22.04-arm
            asset: sysand-linux-arm64-gnu
            binary: target/release/sysand
            libc: gnu
          - os: ubuntu-24.04
            asset: sysand-linux-x86_64-musl
            target: x86_64-unknown-linux-musl
            binary: target/x86_64-unknown-linux-musl/release/sysand
            libc: musl
          - os: ubuntu-24.04-arm
            asset: sysand-linux-arm64-musl
            target: aarch64-unknown-linux-musl
            binary: target/aarch64-unknown-linux-musl/release/sysand
            libc: musl
          - os: windows-latest
            asset: sysand-windows-x86_64.exe
            target: ""
            binary: target/release/sysand.exe
          - os: windows-11-arm
            asset: sysand-windows-arm64.exe
            target: ""
            binary: target/release/sysand.exe
          - os: macos-15-intel
            asset: sysand-macos-x86_64
            target: ""
            binary: target/release/sysand
          - os: macos-latest
            asset: sysand-macos-arm64
            target: ""
            binary: target/release/sysand
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: (linux musl) Install musl tools
        if: matrix.libc == 'musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.target }}"

          target="${{ matrix.target }}"
          echo "CC_${target//-/_}=musl-gcc" >> "$GITHUB_ENV"
          echo "CARGO_BUILD_TARGET=$target" >> "$GITHUB_ENV"

      - name: cargo build ...
        run: cargo build --locked --bin sysand --release

      - name: Relocate binaries
        run: |
          mkdir -p dist
          cp "${{ matrix.binary }}" dist/${{ matrix.asset }}

      - name: (linux gnu) Check glibc requirement
        if: matrix.libc == 'gnu'
        run: |
          file "dist/${{ matrix.asset }}"
          ldd "dist/${{ matrix.asset }}"

          max_glibc_version="$(
            readelf --version-info "dist/${{ matrix.asset }}" \
              | grep -o 'GLIBC_[0-9][0-9.]*' \
              | sed 's/^GLIBC_//' \
              | sort -Vu \
              | tail -n 1
          )"
          if [[ -z "$max_glibc_version" ]]; then
            echo "dist/${{ matrix.asset }} has no detected GLIBC symbol versions" >&2
            exit 1
          fi

          echo "Maximum required GLIBC version: $max_glibc_version"
          if [[ "$(printf '%s\n' "2.35" "$max_glibc_version" | sort -V | tail -n 1)" != "2.35" ]]; then
            echo "dist/${{ matrix.asset }} requires GLIBC_$max_glibc_version, newer than GLIBC_2.35" >&2
            exit 1
          fi

      - name: (linux musl) Check binary is static
        if: matrix.libc == 'musl'
        run: |
          file "dist/${{ matrix.asset }}"
          ldd "dist/${{ matrix.asset }}" || true

          if readelf -l "dist/${{ matrix.asset }}" | grep -q "Requesting program interpreter"; then
            echo "dist/${{ matrix.asset }} has a dynamic loader and is not static" >&2
            exit 1
          fi

          if readelf -d "dist/${{ matrix.asset }}" 2>/dev/null | grep -q "(NEEDED)"; then
            echo "dist/${{ matrix.asset }} has dynamic library dependencies" >&2
            exit 1
          fi

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  ci-gate:
    name: Rust CI Gate
    needs: [plan, lint-and-format, test, build]
    if: needs.plan.outputs.gate == 'true' && !cancelled()
    runs-on: ubuntu-slim
    steps:
      - run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi

  nightly-release:
    name: Nightly Release
    needs: [test, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      id-token: write # for actions/attest
      attestations: write # for actions/attest
      artifact-metadata: write # for actions/attest
      contents: write # for "gh release create"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: "artifacts/*"

      - name: Update the nightly release
        run: |
          NIGHTLY_TAG=nightly

          if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            gh release delete "$NIGHTLY_TAG" --yes
          fi

          git tag --force "$NIGHTLY_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$NIGHTLY_TAG"

          gh release create "$NIGHTLY_TAG" artifacts/sysand-* \
              --title "Nightly Release" \
              --prerelease \
              --latest=false \
              --verify-tag

        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
