name: Publish Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag associated with the release to publish
        required: true
        type: string
      use_default_branch_dockerfile:
        description: Use the Dockerfiles from the default branch instead of the release tag
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # for cosign and actions/attest-build-provenance
  attestations: write # for actions/attest-build-provenance
  artifact-metadata: write # for actions/attest-build-provenance
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.use_default_branch_dockerfile && github.event.repository.default_branch || inputs.tag || github.event.release.tag_name }}

      # For builds triggered for a git tag 1.2.3, we calculate image tags like:
      # [{prefix}:1.2.3, {prefix}:1.2, {prefix}:1, {prefix}:latest]
      #
      # ref: https://github.com/jupyterhub/action-major-minor-tag-calculator
      #
      - name: Fetch repository tags
        id: repo-tags
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          tags="$(gh api --paginate --slurp "repos/$GITHUB_REPOSITORY/tags" | jq -c '[.[][] | .name]')"
          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "new=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Declare image tags
        id: tags
        uses: jupyterhub/action-major-minor-tag-calculator@40566ffdf246e5a9e640cf768df890ead4424b22 # v4.0.0
        with:
          existingTags: ${{ steps.repo-tags.outputs.tags }}
          newTag: ${{ steps.repo-tags.outputs.new }}
          prefix: "ghcr.io/${{ github.repository }}:"

      - name: Declare alpine image tags
        id: tags-alpine
        uses: jupyterhub/action-major-minor-tag-calculator@40566ffdf246e5a9e640cf768df890ead4424b22 # v4.0.0
        with:
          existingTags: ${{ steps.repo-tags.outputs.tags }}
          newTag: ${{ steps.repo-tags.outputs.new }}
          prefix: "ghcr.io/${{ github.repository }}:"
          suffix: "-alpine"

      - name: Wait for release assets to be uploaded
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          required_assets=(
            sysand-linux-x86_64-gnu.tar.gz
            sysand-linux-arm64-gnu.tar.gz
            sysand-linux-x86_64-musl.tar.gz
            sysand-linux-arm64-musl.tar.gz
          )

          for attempt in {1..10}; do
            assets="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"

            missing_assets=()
            for asset in "${required_assets[@]}"; do
              if ! grep -Fxq "$asset" <<< "$assets"; then
                missing_assets+=("$asset")
              fi
            done
            if [[ "${#missing_assets[@]}" == 0 ]]; then
              break
            fi

            if [[ "$attempt" == 10 ]]; then
              echo "Release $TAG does not include assets: ${missing_assets[*]}" >&2
              exit 1
            fi

            echo "Release $TAG does not include assets yet: ${missing_assets[*]}. Sleeping before attempt $((attempt + 1))..."
            sleep 6
          done

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          gh release download "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern sysand-linux-x86_64-gnu.tar.gz \
              --pattern sysand-linux-arm64-gnu.tar.gz \
              --pattern sysand-linux-x86_64-musl.tar.gz \
              --pattern sysand-linux-arm64-musl.tar.gz

          mkdir sysand-amd64 sysand-arm64 sysand-amd64-musl sysand-arm64-musl
          tar -xzf sysand-linux-x86_64-gnu.tar.gz -C sysand-amd64
          tar -xzf sysand-linux-arm64-gnu.tar.gz -C sysand-arm64
          tar -xzf sysand-linux-x86_64-musl.tar.gz -C sysand-amd64-musl
          tar -xzf sysand-linux-arm64-musl.tar.gz -C sysand-arm64-musl

      - name: Set up QEMU (for docker buildx)
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx (for multi-arch builds)
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to ghcr.io (GitHub Container Registry)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        id: build-image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ join(fromJson(steps.tags.outputs.tags)) }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push alpine image
        id: build-alpine-image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ join(fromJson(steps.tags-alpine.outputs.tags)) }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Sign images
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          IMAGE_DIGEST: ${{ steps.build-image.outputs.digest }}
          ALPINE_IMAGE_DIGEST: ${{ steps.build-alpine-image.outputs.digest }}
        run: |
          cosign sign --yes "$IMAGE@$IMAGE_DIGEST"
          cosign sign --yes "$IMAGE@$ALPINE_IMAGE_DIGEST"

      - name: Generate image provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-image.outputs.digest }}
          push-to-registry: true

      - name: Generate alpine image provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-alpine-image.outputs.digest }}
          push-to-registry: true
